services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_helpdesk && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost,0.0.0.0
